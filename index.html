<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>To-Do-List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app">
        <p class="eyebrow">DAILY LEDGER</p>
        <h1 id="title">To-Do-List</h1>
        <input type="text" id="taskInput" placeholder="Enter your task">
        <button type="button" id="addBtn">add task</button>
        <p>total tasks: <span id="taskcount"></span></p>
        <ul id="taskList"></ul>
    </div>
</body>

<script src="script.js"></script>

</html>
